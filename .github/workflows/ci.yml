name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Display files (build simulation)
      - name: Display Files
        run: ls -la

      # Step 3: Build success message
      - name: Build Success
        run: echo "Build completed successfully!"

      # Step 4: Send notification to Slack
      - name: Notify Slack
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ CI Pipeline completed for devops-webapp"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
